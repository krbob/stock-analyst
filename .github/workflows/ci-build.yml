name: CI Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Lint Dockerfiles
        run: |
          docker run --rm -i hadolint/hadolint:v2.14.0-debian@sha256:158cd0184dcaa18bd8ec20b61f4c1cabdf8b32a592d062f57bdcb8e4c1d312e2 hadolint --failure-threshold error - < Dockerfile
          docker run --rm -i hadolint/hadolint:v2.14.0-debian@sha256:158cd0184dcaa18bd8ec20b61f4c1cabdf8b32a592d062f57bdcb8e4c1d312e2 hadolint --failure-threshold error - < backend-yfinance/Dockerfile

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
          build-scan-terms-of-use-agree: 'yes'

      - name: Verify dependency locks
        run: |
          set -euo pipefail
          ./gradlew resolveAndLockAll --write-locks
          lock_changes="$(git status --porcelain -- '*gradle.lockfile')"
          if [[ -n "$lock_changes" ]]; then
            echo "Dependency lockfiles are stale:"
            echo "$lock_changes"
            exit 1
          fi

      - name: Run detekt
        run: ./gradlew detekt

      - name: Run unit tests
        run: ./gradlew test

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.13.14'

      - name: Verify backend dependency locks
        working-directory: backend-yfinance
        run: |
          set -euo pipefail
          python -m pip install --require-hashes -r requirements-tooling.lock
          pip-compile --quiet --generate-hashes --strip-extras --resolver=backtracking \
            --output-file=requirements.lock requirements.txt
          pip-compile --quiet --generate-hashes --strip-extras --resolver=backtracking \
            --output-file=requirements-dev.lock requirements-dev.txt
          pip-compile --quiet --generate-hashes --strip-extras --allow-unsafe --resolver=backtracking \
            --output-file=requirements-tooling.lock requirements-tooling.txt
          lock_changes="$(git status --porcelain -- requirements.lock requirements-dev.lock requirements-tooling.lock)"
          if [[ -n "$lock_changes" ]]; then
            echo "Python dependency lockfiles are stale:"
            echo "$lock_changes"
            exit 1
          fi

      - name: Run backend tests
        working-directory: backend-yfinance
        run: |
          python -m pip install --require-hashes -r requirements-dev.lock
          python -m pip check
          pytest test_app.py

      - name: Generate reproducible CycloneDX SBOM
        id: sbom
        run: |
          set -euo pipefail
          sbom="build/reports/cyclonedx/stock-analyst.cdx.json"
          ./gradlew cyclonedxBom --rerun-tasks
          first_hash="$(sha256sum "$sbom" | cut -d ' ' -f 1)"
          ./gradlew cyclonedxBom --rerun-tasks
          second_hash="$(sha256sum "$sbom" | cut -d ' ' -f 1)"
          if [[ "$first_hash" != "$second_hash" ]]; then
            echo "CycloneDX SBOM is not reproducible: $first_hash != $second_hash"
            exit 1
          fi
          echo "sha256=$second_hash" >> "$GITHUB_OUTPUT"

      - name: Upload CycloneDX SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: stock-analyst-sbom-${{ steps.sbom.outputs.sha256 }}
          path: build/reports/cyclonedx/stock-analyst.cdx.json
          if-no-files-found: error
          retention-days: 14

      - name: Scan JVM runtime dependencies
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          cache-dir: ${{ runner.temp }}/trivy-cache
          scan-type: sbom
          scan-ref: build/reports/cyclonedx/stock-analyst.cdx.json
          version: v0.72.0
          scanners: vuln
          vuln-type: library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          hide-progress: true
          timeout: 10m0s

      - name: Build backend test image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./backend-yfinance
          load: true
          tags: stock-analyst-backend-yfinance:test
          cache-from: type=gha,scope=stock-analyst-backend-yfinance
          cache-to: type=gha,mode=max,scope=stock-analyst-backend-yfinance

      - name: Build API test image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          load: true
          tags: stock-analyst:test
          cache-from: type=gha,scope=stock-analyst-api
          cache-to: type=gha,mode=max,scope=stock-analyst-api

      - name: Scan backend image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          cache-dir: ${{ runner.temp }}/trivy-cache
          scan-type: image
          image-ref: stock-analyst-backend-yfinance:test
          skip-setup-trivy: true
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          hide-progress: true
          timeout: 10m0s

      - name: Scan API image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          cache-dir: ${{ runner.temp }}/trivy-cache
          scan-type: image
          image-ref: stock-analyst:test
          skip-setup-trivy: true
          scanners: vuln
          vuln-type: os
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
          hide-progress: true
          timeout: 10m0s

      - name: Test containers
        env:
          STOCK_ANALYST_IMAGE: stock-analyst:test
          STOCK_ANALYST_BACKEND_YFINANCE_IMAGE: stock-analyst-backend-yfinance:test
        run: |
          echo "🛠️ Building and running containers locally for testing"
          docker compose up -d --no-build

          echo "⏳ Waiting for API health..."
          for attempt in {1..60}; do
            if curl --fail --silent --show-error http://localhost:8080/readyz >/dev/null; then
              break
            fi
            if [ "$attempt" = "60" ]; then
              echo "❌ API did not become healthy"
              docker compose ps
              docker compose logs
              exit 1
            fi
            sleep 2
          done

          echo "📦 Checking container status:"
          docker ps -a

          for container in $(docker compose ps --all --quiet); do
            running=$(docker inspect --format='{{.State.Running}}' "$container")
            health=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' "$container")
            if [ "$running" != "true" ] || [ "$health" != "healthy" ]; then
              echo "❌ Container $container is not healthy (running=$running, health=$health)"
              docker logs "$container"
              exit 1
            fi
          done

          echo "🔍 Checking deterministic runtime contracts..."
          curl --fail --silent --show-error http://localhost:8080/healthz >/dev/null
          curl --fail --silent --show-error http://localhost:8080/openapi/v1.json \
            | jq --exit-status '.openapi == "3.0.3" and (.paths["/v1/quote/{stock}"] != null)' >/dev/null
          curl --fail --silent --show-error http://localhost:8080/metrics \
            | grep --quiet '^# TYPE stock_analyst_http_requests_total counter$'
          docker compose exec -T stock-analyst-backend-yfinance \
            curl --fail --silent --show-error http://localhost:8081/metrics \
            | grep --quiet '^# TYPE stock_analyst_yfinance_http_requests_total counter$'

          status=$(curl --silent --show-error --output /tmp/api-error.json \
            --write-out '%{http_code}' \
            --header 'X-Request-ID: deterministic-container-smoke' \
            'http://localhost:8080/v1/quote/AAPL?currency=INVALID')
          test "$status" = "400"
          jq --exit-status \
            '.errorCode == "INVALID_REQUEST" and .retryable == false and .requestId == "deterministic-container-smoke"' \
            /tmp/api-error.json >/dev/null

          status=$(curl --silent --show-error --output /tmp/not-found.json \
            --write-out '%{http_code}' http://localhost:8080/v1/not-a-route)
          test "$status" = "404"
          jq --exit-status '.errorCode == "NOT_FOUND" and .retryable == false' \
            /tmp/not-found.json >/dev/null
      - name: Clean up test containers
        if: always()
        run: docker compose down

  build:
    runs-on: ubuntu-24.04
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to the Container registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker for backend
        id: meta-backend
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend-yfinance

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image for backend
        id: push-backend
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ./backend-yfinance
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=stock-analyst-backend-yfinance
          cache-to: type=gha,mode=max,scope=stock-analyst-backend-yfinance

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=stock-analyst-api
          cache-to: type=gha,mode=max,scope=stock-analyst-api
