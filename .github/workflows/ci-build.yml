name: CI Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Lint Dockerfiles
        run: |
          docker run --rm -i hadolint/hadolint:latest hadolint --failure-threshold error - < Dockerfile
          docker run --rm -i hadolint/hadolint:latest hadolint --failure-threshold error - < backend-yfinance/Dockerfile

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
          build-scan-terms-of-use-agree: 'yes'

      - name: Run detekt
        run: ./gradlew detekt

      - name: Run unit tests
        run: ./gradlew test

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Run backend tests
        working-directory: backend-yfinance
        run: |
          pip install -r requirements-dev.txt
          pytest test_app.py

      - name: Build backend test image
        uses: docker/build-push-action@v7
        with:
          context: ./backend-yfinance
          load: true
          tags: stock-analyst-backend-yfinance:test
          cache-from: type=gha,scope=stock-analyst-backend-yfinance
          cache-to: type=gha,mode=max,scope=stock-analyst-backend-yfinance

      - name: Build API test image
        uses: docker/build-push-action@v7
        with:
          context: .
          load: true
          tags: stock-analyst:test
          cache-from: type=gha,scope=stock-analyst-api
          cache-to: type=gha,mode=max,scope=stock-analyst-api

      - name: Test containers
        env:
          STOCK_ANALYST_IMAGE: stock-analyst:test
          STOCK_ANALYST_BACKEND_YFINANCE_IMAGE: stock-analyst-backend-yfinance:test
        run: |
          echo "🛠️ Building and running containers locally for testing"
          docker compose up -d --no-build

          echo "⏳ Waiting for API health..."
          for attempt in {1..60}; do
            if curl --fail --silent --show-error http://localhost:8080/readyz >/dev/null; then
              break
            fi
            if [ "$attempt" = "60" ]; then
              echo "❌ API did not become healthy"
              docker compose ps
              docker compose logs
              exit 1
            fi
            sleep 2
          done

          echo "📦 Checking container status:"
          docker ps -a

          for container in $(docker compose ps -q); do
            status=$(docker inspect --format='{{.State.ExitCode}}' "$container")
            if [ "$status" != "0" ]; then
              echo "❌ Container $container exited with code $status"
              docker logs "$container"
              exit 1
            fi
          done

          echo "🔍 Checking deterministic runtime contracts..."
          curl --fail --silent --show-error http://localhost:8080/healthz >/dev/null
          curl --fail --silent --show-error http://localhost:8080/openapi/v1.json \
            | jq --exit-status '.openapi == "3.0.3" and (.paths["/v1/quote/{stock}"] != null)' >/dev/null
          curl --fail --silent --show-error http://localhost:8080/metrics \
            | grep --quiet '^stock_analyst_http_requests_total'
          docker compose exec -T stock-analyst-backend-yfinance \
            curl --fail --silent --show-error http://localhost:8081/metrics \
            | grep --quiet '^yfinance_http_requests_total'

          status=$(curl --silent --show-error --output /tmp/api-error.json \
            --write-out '%{http_code}' \
            --header 'X-Request-ID: deterministic-container-smoke' \
            'http://localhost:8080/v1/quote/AAPL?currency=INVALID')
          test "$status" = "400"
          jq --exit-status \
            '.errorCode == "INVALID_REQUEST" and .retryable == false and .requestId == "deterministic-container-smoke"' \
            /tmp/api-error.json >/dev/null

          status=$(curl --silent --show-error --output /tmp/not-found.json \
            --write-out '%{http_code}' http://localhost:8080/v1/not-a-route)
          test "$status" = "404"
          jq --exit-status '.errorCode == "NOT_FOUND" and .retryable == false' \
            /tmp/not-found.json >/dev/null
      - name: Clean up test containers
        if: always()
        run: docker compose down

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write
      attestations: write

    steps:
      - uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker for backend
        id: meta-backend
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend-yfinance

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image for backend
        id: push-backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend-yfinance
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=stock-analyst-backend-yfinance
          cache-to: type=gha,mode=max,scope=stock-analyst-backend-yfinance

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=stock-analyst-api
          cache-to: type=gha,mode=max,scope=stock-analyst-api
