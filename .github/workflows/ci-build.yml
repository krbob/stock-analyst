name: CI Build Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-publish: true
          build-scan-terms-of-use-url: 'https://gradle.com/help/legal-terms-of-use'
          build-scan-terms-of-use-agree: 'yes'

      - name: Run detekt
        run: ./gradlew detekt

      - name: Run unit tests
        run: ./gradlew test

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Run backend tests
        working-directory: backend-yfinance
        run: |
          pip install -r requirements-dev.txt
          pytest test_app.py

      - name: Test containers
        run: |
          echo "🛠️ Building and running containers locally for testing"
          docker compose up -d

          echo "⏳ Waiting for containers to start..."
          sleep 15

          echo "📦 Checking container status:"
          docker ps -a

          for container in $(docker compose ps -q); do
            status=$(docker inspect --format='{{.State.ExitCode}}' $container)
            if [ "$status" != "0" ]; then
              echo "❌ Container $container exited with code $status"
              docker logs $container
              exit 1
            fi
          done

          echo "🔍 Sending test requests..."
          if ! curl --fail -X GET http://localhost:8080/quote/aapl; then
            echo "❌ quote endpoint did not respond properly"
            exit 1
          fi

          if ! curl --fail -X GET "http://localhost:8080/quote/aapl?currency=EUR"; then
            echo "❌ quote with currency conversion did not respond properly"
            exit 1
          fi

          if ! curl --fail -X GET "http://localhost:8080/compare?symbols=AAPL,MSFT"; then
            echo "❌ compare endpoint did not respond properly"
            exit 1
          fi

          if ! curl --fail -X GET http://localhost:8080/history/aapl; then
            echo "❌ history endpoint did not respond properly"
            exit 1
          fi

          if ! curl --fail -X GET "http://localhost:8080/history/aapl?period=1y&indicators=sma50,rsi,macd"; then
            echo "❌ history with indicators endpoint did not respond properly"
            exit 1
          fi

          if ! curl --fail -X GET "http://localhost:8080/history/aapl?period=1d&interval=5m"; then
            echo "❌ history intraday endpoint did not respond properly"
            exit 1
          fi

          if ! curl --fail -X GET "http://localhost:8080/history/aapl?currency=EUR"; then
            echo "❌ history with currency conversion did not respond properly"
            exit 1
          fi

          if ! curl --fail -X GET "http://localhost:8080/history/aapl?period=5y&dividends=true"; then
            echo "❌ history with dividends did not respond properly"
            exit 1
          fi

          if ! curl --fail -X GET "http://localhost:8080/history/aapl?from=2024-01-01&to=2024-06-30"; then
            echo "❌ history with explicit range did not respond properly"
            exit 1
          fi

          if ! curl --fail -X GET "http://localhost:8080/indicators/aapl?indicators=rsi"; then
            echo "❌ indicators endpoint did not respond properly"
            exit 1
          fi

          if ! curl --fail -X GET "http://localhost:8080/indicators/aapl?indicators=rsi&period=5y&interval=1wk"; then
            echo "❌ indicators with weekly interval did not respond properly"
            exit 1
          fi
      - name: Clean up test containers
        if: always()
        run: docker compose down

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write
      attestations: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker for backend
        id: meta-backend
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend-yfinance

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image for backend
        id: push-backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend-yfinance
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
